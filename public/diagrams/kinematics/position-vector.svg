<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 340" font-family="Georgia,serif" font-size="14">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#374151"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#16a34a"/></marker>
  </defs>
  <rect width="420" height="340" fill="#fafafa" rx="8"/>
  <text x="210" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Position Vector in 2D</text>
  <!-- axes -->
  <line x1="60" y1="280" x2="380" y2="280" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="60" y1="280" x2="60" y2="40" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="388" y="284" font-size="14" fill="#374151">x</text>
  <text x="52" y="36" font-size="14" fill="#374151">y</text>
  <text x="52" y="295" font-size="14" fill="#374151">O</text>
  <!-- grid dots -->
  <g fill="#d1d5db">
    <circle cx="130" cy="220" r="2"/><circle cx="200" cy="220" r="2"/><circle cx="270" cy="220" r="2"/>
    <circle cx="130" cy="160" r="2"/><circle cx="200" cy="160" r="2"/><circle cx="270" cy="160" r="2"/>
    <circle cx="130" cy="100" r="2"/><circle cx="200" cy="100" r="2"/><circle cx="270" cy="100" r="2"/>
  </g>
  <!-- dashed component lines -->
  <line x1="60" y1="130" x2="270" y2="130" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="270" y1="280" x2="270" y2="130" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- position vector -->
  <line x1="60" y1="280" x2="265" y2="135" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <!-- point P -->
  <circle cx="270" cy="130" r="5" fill="#2563eb"/>
  <text x="278" y="126" font-size="14" fill="#2563eb" font-weight="bold">P(x, y)</text>
  <!-- label r -->
  <text x="145" y="195" font-size="15" fill="#2563eb" font-style="italic">r&#8407;</text>
  <!-- x label -->
  <line x1="60" y1="292" x2="270" y2="292" stroke="#374151" stroke-width="1"/>
  <line x1="60" y1="288" x2="60" y2="296" stroke="#374151" stroke-width="1"/>
  <line x1="270" y1="288" x2="270" y2="296" stroke="#374151" stroke-width="1"/>
  <text x="160" y="310" text-anchor="middle" font-size="13" fill="#374151">x</text>
  <!-- y label -->
  <line x1="44" y1="280" x2="44" y2="130" stroke="#374151" stroke-width="1"/>
  <line x1="40" y1="280" x2="48" y2="280" stroke="#374151" stroke-width="1"/>
  <line x1="40" y1="130" x2="48" y2="130" stroke="#374151" stroke-width="1"/>
  <text x="32" y="210" text-anchor="middle" font-size="13" fill="#374151">y</text>
  <!-- magnitude label -->
  <text x="135" y="235" font-size="13" fill="#6b7280" font-style="italic">|r&#8407;| = &#x221A;(x&#178;+y&#178;)</text>
</svg>
