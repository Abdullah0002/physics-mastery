<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 360" width="400" height="360" font-family="Arial, sans-serif">
  <rect width="400" height="360" fill="#f8f9fa" rx="10"/>
  <text x="200" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">Wheatstone Bridge</text>

  <!-- Nodes: A(top)=200,60  B(left)=80,190  C(bottom)=200,320  D(right)=320,190 -->
  <circle cx="200" cy="65"  r="6" fill="#333"/>
  <circle cx="80"  cy="195" r="6" fill="#333"/>
  <circle cx="200" cy="320" r="6" fill="#333"/>
  <circle cx="320" cy="195" r="6" fill="#333"/>

  <!-- Labels -->
  <text x="200" y="50"  text-anchor="middle" font-size="13" fill="#333" font-weight="bold">A</text>
  <text x="62"  y="200" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">B</text>
  <text x="200" y="340" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">C</text>
  <text x="338" y="200" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">D</text>

  <!-- Arms: AB=P, AD=Q, BC=R, DC=S -->
  <!-- AB (left-top) -->
  <line x1="195" y1="71"  x2="86"  y2="189" stroke="#555" stroke-width="1.5"/>
  <rect x="114" y="108" width="50" height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2" transform="rotate(-52,139,118)"/>
  <text x="132" y="118" text-anchor="middle" font-size="12" fill="#e05252" transform="rotate(-52,132,118)">P</text>

  <!-- AD (right-top) -->
  <line x1="205" y1="71"  x2="314" y2="189" stroke="#555" stroke-width="1.5"/>
  <rect x="244" y="108" width="50" height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2" transform="rotate(52,269,118)"/>
  <text x="268" y="118" text-anchor="middle" font-size="12" fill="#e05252" transform="rotate(52,268,118)">Q</text>

  <!-- BC (left-bottom) -->
  <line x1="86"  y1="201" x2="195" y2="314" stroke="#555" stroke-width="1.5"/>
  <rect x="114" y="238" width="50" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="2" transform="rotate(52,139,248)"/>
  <text x="132" y="248" text-anchor="middle" font-size="12" fill="#2980b9" transform="rotate(52,132,248)">R</text>

  <!-- DC (right-bottom) -->
  <line x1="314" y1="201" x2="205" y2="314" stroke="#555" stroke-width="1.5"/>
  <rect x="244" y="238" width="50" height="20" rx="4" fill="white" stroke="#2980b9" stroke-width="2" transform="rotate(-52,269,248)"/>
  <text x="268" y="248" text-anchor="middle" font-size="12" fill="#2980b9" transform="rotate(-52,268,248)">S</text>

  <!-- Galvanometer BD -->
  <line x1="86" y1="195" x2="164" y2="195" stroke="#555" stroke-width="1.5"/>
  <circle cx="200" cy="195" r="20" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="200" y="200" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">G</text>
  <line x1="236" y1="195" x2="314" y2="195" stroke="#555" stroke-width="1.5"/>

  <!-- Battery AC -->
  <line x1="200" y1="71"  x2="200" y2="93"  stroke="#333" stroke-width="1.5"/>
  <line x1="185" y1="95"  x2="215" y2="95"  stroke="#333" stroke-width="3"/>
  <line x1="189" y1="102" x2="211" y2="102" stroke="#333" stroke-width="1.5"/>
  <line x1="200" y1="104" x2="200" y2="320" stroke="none"/>
  <!-- connect battery bottom to C via left side -->
  <line x1="168" y1="104" x2="168" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="168" y1="320" x2="200" y2="320" stroke="#333" stroke-width="1.5"/>
  <line x1="168" y1="95"  x2="200" y2="95"  stroke="none"/>
  <text x="155" y="210" font-size="11" fill="#333">E</text>

  <!-- Balance condition -->
  <text x="200" y="355" text-anchor="middle" font-size="11" fill="#555">Balance: P/Q = R/S  (I_G = 0)</text>
</svg>
