<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" font-family="Georgia,serif" font-size="13">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc2626"/></marker>
    <marker id="arr-k" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#374151"/></marker>
  </defs>
  <rect width="380" height="360" fill="#fafafa" rx="8"/>
  <text x="190" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Free Fall — Time Symmetry</text>
  <!-- ground -->
  <line x1="60" y1="310" x2="340" y2="310" stroke="#374151" stroke-width="2"/>
  <!-- vertical axis -->
  <line x1="190" y1="310" x2="190" y2="50" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-k)"/>
  <text x="196" y="46" font-size="12" fill="#9ca3af">y (height)</text>
  <!-- trajectory: parabola going up then down (here shown as positions at times) -->
  <!-- Ball positions at multiple heights: launch at y=310, peak at y=80, land at y=310 -->
  <!-- Left side (going up): balls at h=0,80,150,220,280,80 -->
  <circle cx="160" cy="310" r="10" fill="#2563eb"/>
  <circle cx="155" cy="240" r="9" fill="#2563eb" opacity="0.85"/>
  <circle cx="150" cy="180" r="8" fill="#2563eb" opacity="0.7"/>
  <circle cx="148" cy="128" r="7" fill="#2563eb" opacity="0.55"/>
  <circle cx="148" cy="85" r="6" fill="#2563eb" opacity="0.4"/>
  <!-- Right side (coming down) -->
  <circle cx="230" cy="85" r="6" fill="#dc2626" opacity="0.4"/>
  <circle cx="232" cy="128" r="7" fill="#dc2626" opacity="0.55"/>
  <circle cx="232" cy="180" r="8" fill="#dc2626" opacity="0.7"/>
  <circle cx="236" cy="240" r="9" fill="#dc2626" opacity="0.85"/>
  <circle cx="230" cy="310" r="10" fill="#dc2626"/>
  <!-- symmetry axis at peak -->
  <line x1="80" y1="80" x2="300" y2="80" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="304" y="84" font-size="12" fill="#16a34a">peak: v=0, a=g&#8595;</text>
  <!-- velocity arrows going up (left side) -->
  <line x1="160" y1="310" x2="160" y2="272" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-b)"/>
  <text x="120" y="295" font-size="11" fill="#2563eb">v=u (up)</text>
  <!-- velocity arrows coming down (right side) -->
  <line x1="230" y1="276" x2="230" y2="310" stroke="#dc2626" stroke-width="2" marker-end="url(#arr-r)"/>
  <text x="238" y="296" font-size="11" fill="#dc2626">v=u (down)</text>
  <!-- time annotation -->
  <text x="112" y="326" font-size="12" fill="#2563eb">t = u/g</text>
  <text x="190" y="326" text-anchor="middle" font-size="12" fill="#374151">|</text>
  <text x="230" y="326" font-size="12" fill="#dc2626">t = u/g</text>
  <!-- H annotation -->
  <line x1="72" y1="80" x2="72" y2="310" stroke="#374151" stroke-width="1"/>
  <line x1="68" y1="80" x2="76" y2="80" stroke="#374151" stroke-width="1"/>
  <line x1="68" y1="310" x2="76" y2="310" stroke="#374151" stroke-width="1"/>
  <text x="56" y="198" font-size="14" fill="#374151" font-style="italic">H</text>
  <text x="190" y="358" text-anchor="middle" font-size="12" fill="#374151">H = u&#178;/(2g)&nbsp;&nbsp; T_total = 2u/g&nbsp;&nbsp; Speed on return = u</text>
</svg>
