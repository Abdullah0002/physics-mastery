<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 360" font-family="Georgia,serif" font-size="13">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#16a34a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc2626"/></marker>
    <marker id="arr-k" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#374151"/></marker>
  </defs>
  <rect width="380" height="360" fill="#fafafa" rx="8"/>
  <text x="190" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Rain–Person Problem</text>
  <!-- rain drops (vertical, blue) -->
  <g stroke="#93c5fd" stroke-width="1.5">
    <line x1="60" y1="40" x2="60" y2="70"/>
    <line x1="90" y1="50" x2="90" y2="80"/>
    <line x1="120" y1="40" x2="120" y2="70"/>
    <line x1="150" y1="55" x2="150" y2="85"/>
    <line x1="180" y1="42" x2="180" y2="72"/>
    <line x1="210" y1="48" x2="210" y2="78"/>
    <line x1="240" y1="38" x2="240" y2="68"/>
    <line x1="270" y1="52" x2="270" y2="82"/>
    <line x1="300" y1="40" x2="300" y2="70"/>
  </g>
  <!-- stick figure person at (190, 250) -->
  <circle cx="190" cy="200" r="18" stroke="#374151" stroke-width="2" fill="#fef3c7"/>
  <line x1="190" y1="218" x2="190" y2="270" stroke="#374151" stroke-width="2"/>
  <line x1="160" y1="238" x2="220" y2="238" stroke="#374151" stroke-width="2"/>
  <line x1="190" y1="270" x2="165" y2="300" stroke="#374151" stroke-width="2"/>
  <line x1="190" y1="270" x2="215" y2="300" stroke="#374151" stroke-width="2"/>
  <!-- umbrella (tilted forward) -->
  <path d="M 155 196 Q 190 155 228 196" stroke="#374151" stroke-width="2.5" fill="#fde68a" opacity="0.8"/>
  <line x1="190" y1="196" x2="160" y2="230" stroke="#374151" stroke-width="2"/>
  <!-- ground line -->
  <line x1="40" y1="310" x2="340" y2="310" stroke="#374151" stroke-width="2"/>
  <!-- person walking arrow -->
  <line x1="190" y1="320" x2="310" y2="320" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="250" y="338" text-anchor="middle" font-size="13" fill="#16a34a" font-style="italic">v_P (person)</text>
  <!-- rain velocity vector (downward) -->
  <line x1="70" y1="120" x2="70" y2="185" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <text x="78" y="155" font-size="13" fill="#2563eb" font-style="italic">v_R (rain)</text>
  <!-- relative rain vector (diagonal) -->
  <line x1="300" y1="120" x2="240" y2="185" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="285" y="112" font-size="12" fill="#dc2626">v_rain/person</text>
  <!-- angle arc -->
  <path d="M 300 138 A 18 18 0 0 1 286 152" stroke="#dc2626" stroke-width="1.5" fill="none"/>
  <text x="308" y="156" font-size="12" fill="#374151">&#x3B8;</text>
  <text x="195" y="100" font-size="12" fill="#374151" text-anchor="middle">tan&#x3B8; = v_P / v_R</text>
  <text x="195" y="118" font-size="12" fill="#374151" text-anchor="middle">Umbrella tilts forward by &#x3B8;</text>
</svg>
