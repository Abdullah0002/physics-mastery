<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560" height="260" font-family="Arial, sans-serif">
  <rect width="560" height="260" fill="#f8f9fa" rx="10"/>
  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2d5a">Charge Sharing Between Two Capacitors</text>
  <!-- C1 -->
  <line x1="120" y1="70" x2="120" y2="120" stroke="#e05252" stroke-width="3"/>
  <line x1="132" y1="70" x2="132" y2="120" stroke="#e05252" stroke-width="3"/>
  <text x="126" y="60" text-anchor="middle" font-size="12" fill="#e05252">C&#8321;, V&#8321;</text>
  <!-- C2 -->
  <line x1="420" y1="70" x2="420" y2="120" stroke="#2980b9" stroke-width="3"/>
  <line x1="432" y1="70" x2="432" y2="120" stroke="#2980b9" stroke-width="3"/>
  <text x="426" y="60" text-anchor="middle" font-size="12" fill="#2980b9">C&#8322;, V&#8322;</text>
  <!-- top wire with switch -->
  <line x1="126" y1="70" x2="250" y2="70" stroke="#333" stroke-width="2"/>
  <circle cx="262" cy="70" r="4" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="266" y1="67" x2="282" y2="58" stroke="#333" stroke-width="2"/>
  <circle cx="290" cy="70" r="4" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="294" y1="70" x2="426" y2="70" stroke="#333" stroke-width="2"/>
  <text x="276" y="48" text-anchor="middle" font-size="10" fill="#555">switch</text>
  <!-- bottom wire -->
  <line x1="126" y1="120" x2="426" y2="120" stroke="#333" stroke-width="2"/>
  <text x="280" y="170" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">V_common = (C&#8321;V&#8321; + C&#8322;V&#8322;)/(C&#8321; + C&#8322;)</text>
  <text x="280" y="205" text-anchor="middle" font-size="13" fill="#c0392b">Energy lost: &#916;U = C&#8321;C&#8322;(V&#8321;-V&#8322;)&#178; / 2(C&#8321;+C&#8322;)  &#8805; 0</text>
  <text x="280" y="232" text-anchor="middle" font-size="11" fill="#999">Charge conserved; energy always lost (heat / radiation)</text>
</svg>
