<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 220" width="580" height="220" font-family="Arial, sans-serif">
  <rect width="580" height="220" fill="#f8f9fa" rx="10"/>
  <text x="290" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">Infinite Ladder Network</text>

  <!-- Top rail segments with series resistors R₁ -->
  <line x1="30"  y1="80" x2="80"  y2="80" stroke="#333" stroke-width="2"/>
  <rect x="80"   y="70" width="50" height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="105"  y="84" text-anchor="middle" font-size="11" fill="#e05252">R₁</text>
  <line x1="130" y1="80" x2="190" y2="80" stroke="#333" stroke-width="2"/>
  <rect x="190"  y="70" width="50" height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="215"  y="84" text-anchor="middle" font-size="11" fill="#e05252">R₁</text>
  <line x1="240" y1="80" x2="300" y2="80" stroke="#333" stroke-width="2"/>
  <rect x="300"  y="70" width="50" height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="325"  y="84" text-anchor="middle" font-size="11" fill="#e05252">R₁</text>
  <line x1="350" y1="80" x2="410" y2="80" stroke="#333" stroke-width="2"/>
  <rect x="410"  y="70" width="50" height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="435"  y="84" text-anchor="middle" font-size="11" fill="#e05252">R₁</text>
  <line x1="460" y1="80" x2="510" y2="80" stroke="#333" stroke-width="2"/>
  <text x="520"  y="84" font-size="16" fill="#888">···</text>

  <!-- Bottom rail -->
  <line x1="30"  y1="160" x2="510" y2="160" stroke="#333" stroke-width="2"/>
  <text x="520"  y="164" font-size="16" fill="#888">···</text>

  <!-- Shunt resistors R₂ -->
  <line x1="130" y1="80"  x2="130" y2="120" stroke="#333" stroke-width="1.5"/>
  <rect x="118"  y="120" width="24" height="40" rx="4" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="142"  y="145" font-size="11" fill="#2980b9">R₂</text>
  <line x1="130" y1="160" x2="130" y2="160" stroke="#333" stroke-width="1.5"/>

  <line x1="240" y1="80"  x2="240" y2="120" stroke="#333" stroke-width="1.5"/>
  <rect x="228"  y="120" width="24" height="40" rx="4" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="252"  y="145" font-size="11" fill="#2980b9">R₂</text>

  <line x1="350" y1="80"  x2="350" y2="120" stroke="#333" stroke-width="1.5"/>
  <rect x="338"  y="120" width="24" height="40" rx="4" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="362"  y="145" font-size="11" fill="#2980b9">R₂</text>

  <line x1="460" y1="80"  x2="460" y2="120" stroke="#333" stroke-width="1.5"/>
  <rect x="448"  y="120" width="24" height="40" rx="4" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="472"  y="145" font-size="11" fill="#2980b9">R₂</text>

  <!-- Input terminals -->
  <circle cx="30" cy="80"  r="5" fill="#333"/>
  <circle cx="30" cy="160" r="5" fill="#333"/>
  <text x="18" y="84"  text-anchor="end" font-size="11" fill="#333">+</text>
  <text x="18" y="164" text-anchor="end" font-size="11" fill="#333">−</text>

  <!-- Z_in label -->
  <line x1="20" y1="80"  x2="10" y2="80"  stroke="#555" stroke-width="1"/>
  <line x1="20" y1="160" x2="10" y2="160" stroke="#555" stroke-width="1"/>
  <text x="8"   y="125" text-anchor="end" font-size="12" fill="#555" font-style="italic">Z</text>

  <!-- Formula -->
  <text x="290" y="200" text-anchor="middle" font-size="11" fill="#555">Z = R₁ + R₂Z/(R₂+Z)  ⟹  Z² − R₁Z − R₁R₂ = 0  ⟹  Z = R₁(1+√(1+4R₂/R₁))/2</text>
</svg>
