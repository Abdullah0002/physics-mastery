<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="Georgia,serif" font-size="13">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#16a34a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc2626"/></marker>
    <marker id="arr-k" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#374151"/></marker>
  </defs>
  <rect width="480" height="320" fill="#fafafa" rx="8"/>
  <text x="240" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">River-Boat Problem</text>
  <!-- river banks -->
  <rect x="40" y="60" width="400" height="200" fill="#bfdbfe" opacity="0.5"/>
  <line x1="40" y1="60" x2="440" y2="60" stroke="#1d4ed8" stroke-width="2.5"/>
  <line x1="40" y1="260" x2="440" y2="260" stroke="#374151" stroke-width="2.5"/>
  <text x="445" y="64" font-size="12" fill="#1d4ed8">far bank</text>
  <text x="445" y="264" font-size="12" fill="#374151">near bank</text>
  <!-- river current arrows (horizontal, downstream) -->
  <line x1="80" y1="160" x2="150" y2="160" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-b)"/>
  <line x1="200" y1="160" x2="270" y2="160" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-b)"/>
  <line x1="320" y1="160" x2="390" y2="160" stroke="#1d4ed8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-b)"/>
  <text x="350" y="148" font-size="12" fill="#1d4ed8" font-style="italic">v_r (current)</text>
  <!-- boat starting point -->
  <circle cx="120" cy="260" r="6" fill="#374151"/>
  <text x="108" y="278" font-size="12" fill="#374151">Start</text>
  <!-- CASE A: minimum time (perpendicular) -->
  <!-- boat velocity perpendicular -->
  <line x1="120" y1="260" x2="120" y2="165" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="88" y="210" font-size="12" fill="#16a34a" font-style="italic">v_b</text>
  <!-- actual path (diagonal due to drift) -->
  <line x1="120" y1="260" x2="220" y2="60" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arr-r)"/>
  <text x="186" y="100" font-size="11" fill="#dc2626">actual path</text>
  <text x="186" y="115" font-size="11" fill="#dc2626">(minimum time)</text>
  <!-- landing point A -->
  <circle cx="220" cy="60" r="5" fill="#dc2626"/>
  <text x="225" y="56" font-size="11" fill="#dc2626">A (drift downstream)</text>
  <!-- CASE B: zero drift (aim upstream) -->
  <line x1="310" y1="260" x2="270" y2="165" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="265" y="218" font-size="11" fill="#16a34a">v_b (upstream)</text>
  <line x1="310" y1="260" x2="310" y2="60" stroke="#374151" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#arr-k)"/>
  <text x="316" y="160" font-size="11" fill="#374151">zero-drift</text>
  <text x="316" y="174" font-size="11" fill="#374151">path</text>
  <circle cx="310" cy="60" r="5" fill="#374151"/>
  <text x="316" y="56" font-size="11" fill="#374151">B (directly opposite)</text>
  <!-- width annotation -->
  <line x1="30" y1="60" x2="30" y2="260" stroke="#374151" stroke-width="1"/>
  <line x1="26" y1="60" x2="34" y2="60" stroke="#374151" stroke-width="1"/>
  <line x1="26" y1="260" x2="34" y2="260" stroke="#374151" stroke-width="1"/>
  <text x="16" y="162" text-anchor="middle" font-size="13" fill="#374151" font-style="italic">d</text>
</svg>
