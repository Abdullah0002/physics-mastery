<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" width="500" height="340" font-family="Arial, sans-serif">
  <rect width="500" height="340" fill="#f8f9fa" rx="10"/>
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">Cube of 12 Resistors (each = R)</text>

  <!-- Front face -->
  <line x1="80"  y1="80"  x2="230" y2="80"  stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="230" y1="80"  x2="230" y2="200" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="230" y1="200" x2="80"  y2="200" stroke="#4a6fa5" stroke-width="2.5"/>
  <line x1="80"  y1="200" x2="80"  y2="80"  stroke="#4a6fa5" stroke-width="2.5"/>
  <!-- Back face (offset +80, -50) -->
  <line x1="160" y1="30"  x2="310" y2="30"  stroke="#4a6fa5" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="310" y1="30"  x2="310" y2="150" stroke="#4a6fa5" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="310" y1="150" x2="160" y2="150" stroke="#4a6fa5" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="160" y1="150" x2="160" y2="30"  stroke="#4a6fa5" stroke-width="2" stroke-dasharray="6,3"/>
  <!-- Connecting edges -->
  <line x1="80"  y1="80"  x2="160" y2="30"  stroke="#4a6fa5" stroke-width="2"/>
  <line x1="230" y1="80"  x2="310" y2="30"  stroke="#4a6fa5" stroke-width="2"/>
  <line x1="230" y1="200" x2="310" y2="150" stroke="#4a6fa5" stroke-width="2"/>
  <line x1="80"  y1="200" x2="160" y2="150" stroke="#4a6fa5" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Node labels -->
  <circle cx="80"  cy="80"  r="5" fill="#e05252"/>
  <text x="66"  y="78"  font-size="12" fill="#e05252" font-weight="bold">A</text>
  <circle cx="310" cy="150" r="5" fill="#e05252"/>
  <text x="316" y="150" font-size="12" fill="#e05252" font-weight="bold">G</text>
  <circle cx="230" cy="80"  r="4" fill="#333"/>
  <circle cx="230" cy="200" r="4" fill="#333"/>
  <circle cx="80"  cy="200" r="4" fill="#333"/>
  <circle cx="160" cy="30"  r="4" fill="#333"/>
  <circle cx="310" cy="30"  r="4" fill="#333"/>
  <circle cx="160" cy="150" r="4" fill="#333"/>

  <!-- Results table -->
  <rect x="350" y="60" width="140" height="110" rx="8" fill="white" stroke="#ddd" stroke-width="1.5"/>
  <text x="420" y="80"  text-anchor="middle" font-size="11" fill="#333" font-weight="bold">R_eq (source → sink)</text>
  <line x1="355" y1="85" x2="485" y2="85" stroke="#ddd" stroke-width="1"/>
  <text x="360" y="100" font-size="11" fill="#555">Adjacent vertices:</text>
  <text x="480" y="100" text-anchor="end" font-size="11" fill="#e05252">7R/12</text>
  <text x="360" y="118" font-size="11" fill="#555">Face diagonal:</text>
  <text x="480" y="118" text-anchor="end" font-size="11" fill="#e05252">3R/4</text>
  <text x="360" y="136" font-size="11" fill="#555">Body diagonal:</text>
  <text x="480" y="136" text-anchor="end" font-size="11" fill="#e05252">5R/6</text>
  <text x="420" y="158" text-anchor="middle" font-size="10" fill="#777">(A to G = body diagonal)</text>

  <!-- Symmetry note -->
  <text x="250" y="240" text-anchor="middle" font-size="11" fill="#555" font-weight="bold">Equipotential Groups (body diagonal A→G):</text>
  <rect x="60"  y="252" width="380" height="65" rx="6" fill="#eef3fb" stroke="#4a6fa5" stroke-width="1"/>
  <text x="250" y="270" text-anchor="middle" font-size="10" fill="#333">Layer 1: {A} — single vertex</text>
  <text x="250" y="285" text-anchor="middle" font-size="10" fill="#333">Layer 2: {3 vertices adjacent to A} — same potential V₁</text>
  <text x="250" y="300" text-anchor="middle" font-size="10" fill="#333">Layer 3: {3 vertices adjacent to G} — same potential V₂</text>
  <text x="250" y="315" text-anchor="middle" font-size="10" fill="#333">Layer 4: {G} — single vertex</text>
</svg>
