<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 260" width="500" height="260" font-family="Arial, sans-serif">
  <rect width="500" height="260" fill="#f8f9fa" rx="10"/>
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">EMF Circuit: Battery with Internal Resistance</text>

  <!-- Top rail: A to B -->
  <line x1="50" y1="70" x2="450" y2="70" stroke="#333" stroke-width="2"/>
  <!-- Bottom rail: A to B -->
  <line x1="50" y1="190" x2="450" y2="190" stroke="#333" stroke-width="2"/>
  <!-- Left side: battery -->
  <line x1="50" y1="70"  x2="50"  y2="112" stroke="#333" stroke-width="2"/>
  <line x1="35" y1="114" x2="65"  y2="114" stroke="#333" stroke-width="3"/>
  <text x="22"  y="112" font-size="11" fill="#333">+</text>
  <line x1="39" y1="122" x2="61"  y2="122" stroke="#333" stroke-width="1.5"/>
  <text x="22"  y="128" font-size="11" fill="#333">−</text>
  <line x1="50" y1="124" x2="50"  y2="190" stroke="#333" stroke-width="2"/>
  <text x="16"  y="152" font-size="12" fill="#555" font-style="italic">ε</text>

  <!-- Internal resistance r (left of battery, top rail) -->
  <line x1="50"  y1="70" x2="110" y2="70" stroke="#333" stroke-width="2"/>
  <rect x="110" y="60"  width="60"  height="20" rx="4" fill="white" stroke="#888" stroke-width="2"/>
  <text x="140" y="74" text-anchor="middle" font-size="11" fill="#888">r</text>
  <line x1="170" y1="70" x2="220" y2="70" stroke="#333" stroke-width="2"/>
  <!-- Terminals A and B -->
  <circle cx="220" cy="70"  r="5" fill="#e05252"/>
  <circle cx="220" cy="190" r="5" fill="#e05252"/>
  <text x="225" y="68"  font-size="11" fill="#e05252" font-weight="bold">A (+)</text>
  <text x="225" y="202" font-size="11" fill="#e05252" font-weight="bold">B (−)</text>

  <!-- External resistance R -->
  <line x1="220" y1="70"  x2="360" y2="70"  stroke="#333" stroke-width="2"/>
  <rect x="300" y="60"   width="60"  height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="330" y="74" text-anchor="middle" font-size="11" fill="#e05252">R</text>
  <line x1="360" y1="70"  x2="450" y2="70"  stroke="#333" stroke-width="2"/>
  <line x1="450" y1="70"  x2="450" y2="190" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="190" x2="450" y2="190" stroke="#333" stroke-width="2"/>

  <!-- Current arrow -->
  <path d="M280,50 L310,50" stroke="#2980b9" stroke-width="1.5" marker-end="url(#iarr)"/>
  <text x="295" y="46" text-anchor="middle" font-size="11" fill="#2980b9">I</text>
  <defs><marker id="iarr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#2980b9"/></marker></defs>

  <!-- Annotations -->
  <text x="250" y="228" text-anchor="middle" font-size="11" fill="#555">I = ε / (R + r)</text>
  <text x="250" y="248" text-anchor="middle" font-size="11" fill="#555">Terminal voltage V_T = ε − Ir = IR</text>
</svg>
