<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 320" font-family="Georgia,serif" font-size="13">
  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#16a34a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc2626"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#ea580c"/></marker>
  </defs>
  <rect width="380" height="320" fill="#fafafa" rx="8"/>
  <text x="190" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Non-Uniform Circular Motion</text>
  <!-- Circle -->
  <circle cx="190" cy="165" r="95" stroke="#94a3b8" stroke-width="2" fill="#f1f5f9"/>
  <!-- Centre -->
  <circle cx="190" cy="165" r="4" fill="#374151"/>
  <text x="196" y="172" font-size="12" fill="#374151">O</text>
  <!-- Particle at ~45° -->
  <circle cx="257" cy="98" r="8" fill="#1d4ed8"/>
  <text x="265" y="93" font-size="13" font-weight="bold" fill="#1d4ed8">P</text>
  <!-- Centripetal (inward along radius) -->
  <line x1="257" y1="98" x2="210" y2="130" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="248" y="130" font-size="12" fill="#dc2626">a&#x2C;</text>
  <!-- Tangential (perpendicular) -->
  <line x1="257" y1="98" x2="292" y2="55" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="295" y="58" font-size="12" fill="#16a34a">a&#x209C;</text>
  <!-- Net acceleration (resultant) -->
  <line x1="257" y1="98" x2="268" y2="48" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-o)"/>
  <text x="272" y="42" font-size="12" fill="#ea580c">a&#x20D7;</text>
  <!-- Velocity vector (tangent) -->
  <line x1="257" y1="98" x2="320" y2="110" stroke="#7c3aed" stroke-width="2.5"/>
  <polygon points="320,110 308,106 312,117" fill="#7c3aed"/>
  <text x="325" y="114" font-size="12" fill="#7c3aed">v&#x20D7;</text>
  <!-- Formula box -->
  <rect x="28" y="252" width="324" height="55" fill="#fff" stroke="#e5e7eb" rx="6"/>
  <text x="190" y="270" text-anchor="middle" font-size="12" fill="#374151" font-weight="bold">a&#x2C; = v&#xB2;/r (centripetal)   a&#x209C; = d|v|/dt (tangential)</text>
  <text x="190" y="288" text-anchor="middle" font-size="12" fill="#ea580c" font-weight="bold">|a&#x20D7;| = &#x221A;(a&#x2C;&#xB2; + a&#x209C;&#xB2;)   (net)</text>
  <text x="190" y="300" text-anchor="middle" font-size="11" fill="#6b7280">Speed changes &#x21D2; tangential acceleration present</text>
</svg>
