<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" width="580" height="280" font-family="Arial, sans-serif">
  <rect width="580" height="280" fill="#f8f9fa" rx="10"/>
  <text x="290" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">Meter Bridge (Practical Wheatstone Bridge)</text>

  <!-- Meter bridge wire (1 m = 540px mapped) -->
  <line x1="30" y1="100" x2="550" y2="100" stroke="#4a6fa5" stroke-width="5" stroke-linecap="round"/>
  <text x="30"  y="90" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">A</text>
  <text x="550" y="90" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">B</text>
  <text x="290" y="88" text-anchor="middle" font-size="10" fill="#4a6fa5">100 cm uniform resistance wire</text>

  <!-- Unknown P (left gap) -->
  <line x1="30"  y1="100" x2="30"  y2="160" stroke="#333" stroke-width="1.5"/>
  <rect x="16"   y="160" width="28" height="50" rx="4" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="30"   y="190" text-anchor="middle" font-size="12" fill="#e05252">P</text>
  <line x1="30"  y1="210" x2="30"  y2="230" stroke="#333" stroke-width="1.5"/>

  <!-- Known S (right gap) -->
  <line x1="550" y1="100" x2="550" y2="160" stroke="#333" stroke-width="1.5"/>
  <rect x="536"  y="160" width="28" height="50" rx="4" fill="white" stroke="#2980b9" stroke-width="2"/>
  <text x="550"  y="190" text-anchor="middle" font-size="12" fill="#2980b9">S</text>
  <line x1="550" y1="210" x2="550" y2="230" stroke="#333" stroke-width="1.5"/>

  <!-- Common bottom rail with battery -->
  <line x1="30"  y1="230" x2="200" y2="230" stroke="#333" stroke-width="1.5"/>
  <rect x="200"  y="220" width="30" height="20" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="200"  y="222" width="30" height="8" fill="#ffff99" stroke="#333" stroke-width="1"/>
  <text x="215"  y="248" text-anchor="middle" font-size="10" fill="#333">E</text>
  <line x1="230" y1="230" x2="550" y2="230" stroke="#333" stroke-width="1.5"/>

  <!-- Jockey at balance point l -->
  <circle cx="222" cy="100" r="8" fill="white" stroke="#e05252" stroke-width="2.5"/>
  <line x1="222" y1="108" x2="222" y2="165" stroke="#555" stroke-width="1.5"/>
  <!-- Galvanometer -->
  <circle cx="222" cy="183" r="15" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="222" y="188" text-anchor="middle" font-size="12" fill="#27ae60" font-weight="bold">G</text>
  <line x1="222" y1="198" x2="222" y2="230" stroke="#555" stroke-width="1.5"/>

  <!-- Distance label -->
  <line x1="30"  y1="115" x2="222" y2="115" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="126"  y="128" text-anchor="middle" font-size="11" fill="#555">l cm</text>
  <line x1="222" y1="115" x2="550" y2="115" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="386"  y="128" text-anchor="middle" font-size="11" fill="#888">(100−l) cm</text>

  <!-- Formula -->
  <text x="290" y="262" text-anchor="middle" font-size="12" fill="#555">Balance: P/S = l/(100−l)</text>
</svg>
