<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300" font-family="Arial, sans-serif">
  <rect width="560" height="300" fill="#f8f9fa" rx="10"/>
  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2d5a">Gauss Law for One Plate (Pillbox)</text>
  <rect x="180" y="60" width="10" height="180" fill="#e05252"/>
  <rect x="380" y="60" width="10" height="180" fill="#2980b9"/>
  <text x="160" y="55" font-size="14" font-weight="bold" fill="#e05252">+&#963;</text>
  <text x="384" y="55" font-size="14" font-weight="bold" fill="#2980b9">-&#963;</text>
  <text x="118" y="155" font-size="12" fill="#777">conductor</text>
  <text x="132" y="170" font-size="12" fill="#777">(E = 0)</text>
  <rect x="150" y="120" width="80" height="60" fill="none" stroke="#27ae60" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="190" y="114" text-anchor="middle" font-size="11" fill="#27ae60">Gaussian pillbox</text>
  <text x="155" y="200" font-size="10" fill="#27ae60">inner face: no flux (E=0)</text>
  <defs><marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7a5cc4"/></marker></defs>
  <line x1="200" y1="100" x2="372" y2="100" stroke="#7a5cc4" stroke-width="2" marker-end="url(#ag)"/>
  <line x1="200" y1="150" x2="372" y2="150" stroke="#7a5cc4" stroke-width="2.5" marker-end="url(#ag)"/>
  <line x1="200" y1="200" x2="372" y2="200" stroke="#7a5cc4" stroke-width="2" marker-end="url(#ag)"/>
  <text x="285" y="142" text-anchor="middle" font-size="14" fill="#7a5cc4" font-weight="bold">E = &#963;/&#949;&#8320;</text>
  <text x="440" y="150" font-size="12" fill="#999">outside: E &#8776; 0</text>
  <text x="280" y="270" text-anchor="middle" font-size="12" fill="#555">Flux pierces only the gap-side face: E&#183;a = &#963;a/&#949;&#8320; &#8658; E = &#963;/&#949;&#8320;</text>
</svg>
