<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 240" width="560" height="240" font-family="Arial, sans-serif">
  <rect width="560" height="240" fill="#f8f9fa" rx="10"/>
  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2d5a">Series: Same Charge Q, Voltages Add</text>
  <line x1="50" y1="120" x2="50" y2="95" stroke="#333" stroke-width="2"/>
  <line x1="40" y1="95" x2="60" y2="95" stroke="#333" stroke-width="4"/>
  <line x1="44" y1="88" x2="56" y2="88" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="88" x2="50" y2="70" stroke="#333" stroke-width="2"/>
  <text x="30" y="112" font-size="12" fill="#333">V</text>
  <line x1="50" y1="70" x2="110" y2="70" stroke="#333" stroke-width="2"/>
  <!-- C1 -->
  <line x1="110" y1="55" x2="110" y2="85" stroke="#e05252" stroke-width="3"/>
  <line x1="120" y1="55" x2="120" y2="85" stroke="#e05252" stroke-width="3"/>
  <text x="115" y="48" text-anchor="middle" font-size="11" fill="#e05252">C&#8321;</text>
  <text x="115" y="102" text-anchor="middle" font-size="10" fill="#777">V&#8321;</text>
  <line x1="120" y1="70" x2="230" y2="70" stroke="#333" stroke-width="2"/>
  <!-- C2 -->
  <line x1="230" y1="55" x2="230" y2="85" stroke="#2980b9" stroke-width="3"/>
  <line x1="240" y1="55" x2="240" y2="85" stroke="#2980b9" stroke-width="3"/>
  <text x="235" y="48" text-anchor="middle" font-size="11" fill="#2980b9">C&#8322;</text>
  <text x="235" y="102" text-anchor="middle" font-size="10" fill="#777">V&#8322;</text>
  <line x1="240" y1="70" x2="350" y2="70" stroke="#333" stroke-width="2"/>
  <!-- C3 -->
  <line x1="350" y1="55" x2="350" y2="85" stroke="#27ae60" stroke-width="3"/>
  <line x1="360" y1="55" x2="360" y2="85" stroke="#27ae60" stroke-width="3"/>
  <text x="355" y="48" text-anchor="middle" font-size="11" fill="#27ae60">C&#8323;</text>
  <text x="355" y="102" text-anchor="middle" font-size="10" fill="#777">V&#8323;</text>
  <line x1="360" y1="70" x2="470" y2="70" stroke="#333" stroke-width="2"/>
  <line x1="470" y1="70" x2="470" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="120" x2="50" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="170" x2="470" y2="170" stroke="#333" stroke-width="2"/>
  <text x="280" y="150" text-anchor="middle" font-size="13" fill="#e05252" font-weight="bold">Same Q on every capacitor</text>
  <text x="280" y="205" text-anchor="middle" font-size="13" fill="#1a2d5a">1/C&#8331;&#8320; = 1/C&#8321; + 1/C&#8322; + 1/C&#8323;   (V = V&#8321;+V&#8322;+V&#8323;)</text>
  <text x="280" y="225" text-anchor="middle" font-size="11" fill="#999">Largest voltage sits across the smallest capacitor</text>
</svg>
