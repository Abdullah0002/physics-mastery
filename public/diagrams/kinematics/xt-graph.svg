<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 340" font-family="Georgia,serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#374151"/></marker>
  </defs>
  <rect width="500" height="340" fill="#fafafa" rx="8"/>
  <text x="250" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Position–Time (x-t) Graphs</text>
  <!-- axes -->
  <line x1="50" y1="290" x2="480" y2="290" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="50" y1="290" x2="50" y2="40" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="486" y="294" font-size="13" fill="#374151">t</text>
  <text x="42" y="36" font-size="13" fill="#374151">x</text>
  <!-- A: horizontal (at rest) -->
  <line x1="60" y1="250" x2="130" y2="250" stroke="#6b7280" stroke-width="2.5"/>
  <text x="90" y="268" text-anchor="middle" font-size="12" fill="#6b7280">(A)</text>
  <!-- B: positive slope (uniform) -->
  <line x1="145" y1="270" x2="215" y2="180" stroke="#2563eb" stroke-width="2.5"/>
  <text x="178" y="268" text-anchor="middle" font-size="12" fill="#2563eb">(B)</text>
  <!-- C: concave up (accelerating) -->
  <path d="M 230 270 Q 280 270 320 170" stroke="#16a34a" stroke-width="2.5" fill="none"/>
  <text x="272" y="268" text-anchor="middle" font-size="12" fill="#16a34a">(C)</text>
  <!-- D: concave down (decelerating) -->
  <path d="M 335 180 Q 375 130 420 120" stroke="#dc2626" stroke-width="2.5" fill="none"/>
  <text x="376" y="268" text-anchor="middle" font-size="12" fill="#dc2626">(D)</text>
  <!-- E: turning point (curve with max) -->
  <!-- drawn as inset separate mini graph below -->
  <!-- Legend -->
  <rect x="54" y="44" width="390" height="80" fill="#fff" stroke="#e5e7eb" rx="6"/>
  <line x1="65" y1="60" x2="95" y2="60" stroke="#6b7280" stroke-width="2"/><text x="100" y="64" font-size="12" fill="#374151">(A) At rest: v = 0</text>
  <line x1="65" y1="80" x2="95" y2="80" stroke="#2563eb" stroke-width="2"/><text x="100" y="84" font-size="12" fill="#374151">(B) Uniform motion (const. v): straight oblique line</text>
  <line x1="65" y1="100" x2="95" y2="100" stroke="#16a34a" stroke-width="2"/><text x="100" y="104" font-size="12" fill="#374151">(C) Acceleration: concave up (slope increasing)</text>
  <line x1="245" y1="100" x2="275" y2="100" stroke="#dc2626" stroke-width="2"/><text x="280" y="104" font-size="12" fill="#374151">(D) Deceleration: concave down</text>
  <!-- slope annotation on B -->
  <text x="195" y="218" font-size="11" fill="#2563eb" font-style="italic">slope = v</text>
  <!-- curvature annotation on C -->
  <text x="260" y="215" font-size="11" fill="#16a34a">concave up &#x2192; a&gt;0</text>
  <!-- turning point label on D -->
  <text x="330" y="168" font-size="11" fill="#dc2626">concave down &#x2192; a&lt;0</text>
</svg>
