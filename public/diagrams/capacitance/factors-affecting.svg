<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 240" width="600" height="240" font-family="Arial, sans-serif">
  <rect width="600" height="240" fill="#f8f9fa" rx="10"/>
  <text x="300" y="24" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2d5a">Three Knobs that Set Capacitance</text>
  <text x="100" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">C &#8733; A</text>
  <rect x="55" y="75" width="6" height="40" fill="#e05252"/>
  <rect x="135" y="75" width="6" height="40" fill="#2980b9"/>
  <rect x="55" y="140" width="6" height="80" fill="#e05252"/>
  <rect x="135" y="140" width="6" height="80" fill="#2980b9"/>
  <text x="98" y="135" text-anchor="middle" font-size="10" fill="#777">small area</text>
  <text x="98" y="235" text-anchor="middle" font-size="10" fill="#777">larger area, larger C</text>
  <text x="300" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">C &#8733; 1/d</text>
  <rect x="250" y="75" width="6" height="55" fill="#e05252"/>
  <rect x="350" y="75" width="6" height="55" fill="#2980b9"/>
  <text x="303" y="148" text-anchor="middle" font-size="10" fill="#777">wide gap, small C</text>
  <rect x="270" y="165" width="6" height="55" fill="#e05252"/>
  <rect x="320" y="165" width="6" height="55" fill="#2980b9"/>
  <text x="298" y="235" text-anchor="middle" font-size="10" fill="#777">narrow gap, larger C</text>
  <text x="500" y="55" text-anchor="middle" font-size="13" font-weight="bold" fill="#27ae60">C &#8733; K</text>
  <rect x="455" y="75" width="6" height="120" fill="#e05252"/>
  <rect x="545" y="75" width="6" height="120" fill="#2980b9"/>
  <rect x="461" y="75" width="84" height="120" fill="#cfe8ff" opacity="0.7"/>
  <text x="503" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a6fb5">K</text>
  <text x="500" y="215" text-anchor="middle" font-size="10" fill="#777">dielectric K, C x K</text>
</svg>
