<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 300" font-family="Georgia,serif" font-size="13">
  <defs>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc2626"/></marker>
  </defs>
  <rect width="440" height="300" fill="#fafafa" rx="8"/>
  <text x="220" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Distance vs Displacement</text>
  <!-- curved path from A to B -->
  <path d="M 60 230 C 80 120, 200 60, 240 140 S 340 200 380 220" stroke="#dc2626" stroke-width="3" fill="none"/>
  <!-- straight line (displacement) from A to B -->
  <line x1="60" y1="230" x2="380" y2="220" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="8,4" marker-end="url(#arr-b)"/>
  <!-- points A and B -->
  <circle cx="60" cy="230" r="7" fill="#374151"/>
  <text x="42" y="248" font-size="14" fill="#374151" font-weight="bold">A</text>
  <circle cx="380" cy="220" r="7" fill="#374151"/>
  <text x="386" y="238" font-size="14" fill="#374151" font-weight="bold">B</text>
  <!-- distance label on path -->
  <text x="210" y="82" font-size="13" fill="#dc2626" font-weight="bold">d (distance)</text>
  <text x="180" y="98" font-size="12" fill="#dc2626">= total path length (scalar)</text>
  <!-- displacement label -->
  <text x="155" y="265" font-size="13" fill="#2563eb" font-weight="bold">&#x394;r&#8407; (displacement)</text>
  <text x="130" y="280" font-size="12" fill="#2563eb">= straight line A&#x2192;B (vector)</text>
  <!-- inequality -->
  <rect x="148" y="38" width="144" height="32" fill="#fff" stroke="#e5e7eb" rx="5"/>
  <text x="220" y="60" text-anchor="middle" font-size="14" fill="#374151" font-weight="bold">|&#x394;r&#8407;| &#x2264; d</text>
  <!-- always -->
  <text x="220" y="128" text-anchor="middle" font-size="11" fill="#6b7280">equality only for straight-line, no-reversal motion</text>
</svg>
