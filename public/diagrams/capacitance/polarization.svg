<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 300" width="560" height="300" font-family="Arial, sans-serif">
  <rect width="560" height="300" fill="#f8f9fa" rx="10"/>
  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2d5a">Polarization: Aligned Dipoles and Bound Charge</text>
  <rect x="120" y="55" width="10" height="200" fill="#e05252"/>
  <rect x="430" y="55" width="10" height="200" fill="#2980b9"/>
  <text x="108" y="48" font-size="13" font-weight="bold" fill="#e05252">+&#963;</text>
  <text x="428" y="48" font-size="13" font-weight="bold" fill="#2980b9">-&#963;</text>
  <!-- dielectric slab -->
  <rect x="170" y="55" width="220" height="200" fill="#eaf3fb" stroke="#9cc4e4" stroke-width="1.5"/>
  <!-- bound charge layers -->
  <rect x="170" y="55" width="10" height="200" fill="#b5d3ec"/>
  <rect x="380" y="55" width="10" height="200" fill="#f3c9c9"/>
  <text x="158" y="280" font-size="12" fill="#2980b9">bound -</text>
  <text x="372" y="280" font-size="12" fill="#e05252">bound +</text>
  <!-- dipoles -->
  <g font-size="13" font-weight="bold">
    <g>
      <text x="205" y="100" fill="#2980b9">-</text><text x="245" y="100" fill="#e05252">+</text><line x1="212" y1="96" x2="243" y2="96" stroke="#555" stroke-width="1.5"/>
      <text x="285" y="100" fill="#2980b9">-</text><text x="325" y="100" fill="#e05252">+</text><line x1="292" y1="96" x2="323" y2="96" stroke="#555" stroke-width="1.5"/>
      <text x="205" y="160" fill="#2980b9">-</text><text x="245" y="160" fill="#e05252">+</text><line x1="212" y1="156" x2="243" y2="156" stroke="#555" stroke-width="1.5"/>
      <text x="285" y="160" fill="#2980b9">-</text><text x="325" y="160" fill="#e05252">+</text><line x1="292" y1="156" x2="323" y2="156" stroke="#555" stroke-width="1.5"/>
      <text x="205" y="220" fill="#2980b9">-</text><text x="245" y="220" fill="#e05252">+</text><line x1="212" y1="216" x2="243" y2="216" stroke="#555" stroke-width="1.5"/>
      <text x="285" y="220" fill="#2980b9">-</text><text x="325" y="220" fill="#e05252">+</text><line x1="292" y1="216" x2="323" y2="216" stroke="#555" stroke-width="1.5"/>
    </g>
  </g>
  <defs><marker id="ap" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#7a5cc4"/></marker></defs>
  <line x1="150" y1="55" x2="150" y2="55" stroke="#7a5cc4"/>
  <text x="280" y="275" text-anchor="middle" font-size="12" fill="#555">Dipoles align with E; bound surface charges oppose it &#8658; net field drops to E&#8320;/K</text>
</svg>
