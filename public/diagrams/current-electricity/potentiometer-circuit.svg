<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" width="580" height="280" font-family="Arial, sans-serif">
  <rect width="580" height="280" fill="#f8f9fa" rx="10"/>
  <text x="290" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">Potentiometer Circuit</text>

  <!-- Potentiometer wire AB -->
  <line x1="60"  y1="80" x2="520" y2="80" stroke="#4a6fa5" stroke-width="4"/>
  <circle cx="60"  cy="80" r="5" fill="#4a6fa5"/>
  <circle cx="520" cy="80" r="5" fill="#4a6fa5"/>
  <text x="50"  y="72" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">A</text>
  <text x="530" y="72" text-anchor="middle" font-size="13" fill="#333" font-weight="bold">B</text>
  <text x="290" y="68" text-anchor="middle" font-size="11" fill="#4a6fa5">Potentiometer wire (resistance R₀, length L)</text>

  <!-- Driver battery loop: A → battery → rheostat → B -->
  <line x1="60"  y1="80"  x2="60"  y2="170" stroke="#333" stroke-width="1.5"/>
  <rect x="46"  y="172" width="28" height="14" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="46"  y="188" width="28" height="14" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="72"  y="182" font-size="10" fill="#333">ε₀,r₀</text>
  <line x1="60"  y1="202" x2="60"  y2="230" stroke="#333" stroke-width="1.5"/>
  <rect x="46"  y="230" width="100" height="18" rx="4" fill="white" stroke="#888" stroke-width="1.5"/>
  <text x="96"  y="243" text-anchor="middle" font-size="10" fill="#888">Rheostat (R)</text>
  <line x1="146" y1="239" x2="520" y2="239" stroke="#333" stroke-width="1.5"/>
  <line x1="520" y1="239" x2="520" y2="80"  stroke="#333" stroke-width="1.5"/>

  <!-- Jockey J (sliding contact) -->
  <circle cx="310" cy="80" r="7" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="310" y="76" text-anchor="middle" font-size="10" fill="#e05252">J</text>
  <text x="310" y="64" text-anchor="middle" font-size="10" fill="#555">l →</text>

  <!-- Secondary circuit: J → galvanometer → unknown EMF → A -->
  <line x1="310" y1="87"  x2="310" y2="140" stroke="#333" stroke-width="1.5"/>
  <circle cx="310" cy="158" r="14" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="310" y="163" text-anchor="middle" font-size="11" fill="#27ae60" font-weight="bold">G</text>
  <line x1="310" y1="172" x2="310" y2="200" stroke="#333" stroke-width="1.5"/>
  <rect x="282" y="200" width="56" height="18" rx="3" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="310" y="213" text-anchor="middle" font-size="11" fill="#e05252">ε, r</text>
  <line x1="282" y1="209" x2="60"  y2="209" stroke="#333" stroke-width="1.5"/>
  <line x1="60"  y1="209" x2="60"  y2="80"  stroke="none"/>
  <!-- Connect back to A via the left rail -->
  <line x1="60"  y1="80"  x2="60"  y2="170" stroke="none"/>

  <!-- Annotations -->
  <text x="290" y="262" text-anchor="middle" font-size="11" fill="#555">At null: ε = k·l  where  k = ε₀/(r₀+R₀)</text>
</svg>
