<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 260" width="580" height="260" font-family="Arial, sans-serif">
  <rect width="580" height="260" fill="#f8f9fa" rx="10"/>
  <text x="290" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">Resistors: Series and Parallel Combinations</text>

  <!-- SERIES -->
  <text x="145" y="50" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Series</text>
  <line x1="30" y1="90" x2="70" y2="90" stroke="#333" stroke-width="2"/>
  <rect x="70" y="78" width="60" height="24" rx="4" fill="none" stroke="#e05252" stroke-width="2"/>
  <text x="100" y="93" text-anchor="middle" font-size="11" fill="#e05252">R&#x2081;</text>
  <line x1="130" y1="90" x2="170" y2="90" stroke="#333" stroke-width="2"/>
  <rect x="170" y="78" width="60" height="24" rx="4" fill="none" stroke="#e05252" stroke-width="2"/>
  <text x="200" y="93" text-anchor="middle" font-size="11" fill="#e05252">R&#x2082;</text>
  <line x1="230" y1="90" x2="270" y2="90" stroke="#333" stroke-width="2"/>
  <rect x="270" y="78" width="60" height="24" rx="4" fill="none" stroke="#e05252" stroke-width="2"/>
  <text x="300" y="93" text-anchor="middle" font-size="11" fill="#e05252">R&#x2083;</text>
  <line x1="330" y1="90" x2="370" y2="90" stroke="#333" stroke-width="2"/>
  <text x="185" y="130" text-anchor="middle" font-size="12" fill="#555">R&#x209B;&#x1D49C;&#x1D4BB; = R&#x2081; + R&#x2082; + R&#x2083;</text>
  <text x="185" y="148" text-anchor="middle" font-size="11" fill="#777">Same current I through each</text>

  <!-- PARALLEL -->
  <text x="145" y="178" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Parallel</text>
  <line x1="30"  y1="215" x2="80"  y2="215" stroke="#333" stroke-width="2"/>
  <line x1="80"  y1="195" x2="80"  y2="235" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="195" x2="220" y2="235" stroke="#333" stroke-width="2"/>
  <line x1="220" y1="215" x2="270" y2="215" stroke="#333" stroke-width="2"/>
  <rect x="95"  y="188" width="50" height="18" rx="4" fill="none" stroke="#2980b9" stroke-width="2"/>
  <text x="120" y="200" text-anchor="middle" font-size="10" fill="#2980b9">R&#x2081;</text>
  <rect x="95"  y="213" width="50" height="18" rx="4" fill="none" stroke="#2980b9" stroke-width="2"/>
  <text x="120" y="226" text-anchor="middle" font-size="10" fill="#2980b9">R&#x2082;</text>
  <rect x="155" y="188" width="50" height="18" rx="4" fill="none" stroke="#2980b9" stroke-width="2"/>
  <text x="180" y="200" text-anchor="middle" font-size="10" fill="#2980b9">R&#x2083;</text>
  <text x="150" y="252" text-anchor="middle" font-size="11" fill="#555">1/R&#x209B; = 1/R&#x2081; + 1/R&#x2082; + 1/R&#x2083;</text>
  <text x="150" y="266" text-anchor="middle" font-size="10" fill="#777">Same voltage V across each</text>
</svg>
