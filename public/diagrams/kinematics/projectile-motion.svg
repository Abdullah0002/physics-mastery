<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" font-family="Georgia,serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#374151"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2563eb"/></marker>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#16a34a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#dc2626"/></marker>
  </defs>
  <rect width="520" height="340" fill="#fafafa" rx="8"/>
  <text x="260" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#111">Projectile Motion</text>
  <!-- ground -->
  <line x1="40" y1="290" x2="490" y2="290" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="50" y1="290" x2="50" y2="40" stroke="#374151" stroke-width="2" marker-end="url(#arr)"/>
  <text x="495" y="294" font-size="13">x</text>
  <text x="42" y="36" font-size="13">y</text>
  <!-- parabolic trajectory -->
  <path d="M 70 290 Q 260 60 450 290" stroke="#374151" stroke-width="2.5" fill="none"/>
  <!-- height annotation -->
  <line x1="260" y1="290" x2="260" y2="60" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="254" y1="60" x2="266" y2="60" stroke="#374151" stroke-width="1.5"/>
  <line x1="46" y1="60" x2="54" y2="60" stroke="#374151" stroke-width="1.5"/>
  <line x1="50" y1="60" x2="50" y2="290" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- H brace -->
  <text x="24" y="178" font-size="14" fill="#dc2626" font-style="italic" font-weight="bold">H</text>
  <!-- R brace -->
  <line x1="70" y1="305" x2="450" y2="305" stroke="#374151" stroke-width="1.5"/>
  <line x1="70" y1="300" x2="70" y2="310" stroke="#374151" stroke-width="1.5"/>
  <line x1="450" y1="300" x2="450" y2="310" stroke="#374151" stroke-width="1.5"/>
  <text x="260" y="322" text-anchor="middle" font-size="14" fill="#374151" font-style="italic" font-weight="bold">R</text>
  <!-- launch velocity arrow -->
  <line x1="70" y1="290" x2="118" y2="244" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arr-b)"/>
  <!-- angle arc -->
  <path d="M 90 290 A 20 20 0 0 1 79 271" stroke="#374151" stroke-width="1.5" fill="none"/>
  <text x="97" y="285" font-size="12" fill="#374151">&#x3B8;</text>
  <text x="122" y="240" font-size="12" fill="#2563eb" font-weight="bold">u</text>
  <!-- peak velocity (horizontal arrow) -->
  <line x1="240" y1="62" x2="278" y2="62" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arr-g)"/>
  <text x="255" y="52" text-anchor="middle" font-size="11" fill="#16a34a">v_x = u cosθ</text>
  <!-- mid-flight velocity vectors -->
  <line x1="165" y1="182" x2="195" y2="156" stroke="#2563eb" stroke-width="2" marker-end="url(#arr-b)"/>
  <!-- landing velocity arrow -->
  <line x1="450" y1="290" x2="415" y2="258" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <text x="408" y="252" font-size="12" fill="#dc2626">v_land</text>
  <!-- note at peak -->
  <circle cx="260" cy="60" r="5" fill="#16a34a"/>
  <text x="268" y="72" font-size="11" fill="#16a34a">v_y = 0 here</text>
  <!-- formulas inset -->
  <rect x="54" y="44" width="195" height="70" fill="#fff" stroke="#e5e7eb" rx="5"/>
  <text x="65" y="62" font-size="12" fill="#374151">H = u&#178;sin&#178;&#x3B8; / (2g)</text>
  <text x="65" y="80" font-size="12" fill="#374151">R = u&#178;sin2&#x3B8; / g</text>
  <text x="65" y="98" font-size="12" fill="#374151">T = 2u sin&#x3B8; / g</text>
</svg>
