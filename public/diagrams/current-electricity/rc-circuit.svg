<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280" width="580" height="280" font-family="Arial, sans-serif">
  <rect width="580" height="280" fill="#f8f9fa" rx="10"/>
  <text x="290" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#1a2d5a">RC Circuit: Charging and Discharging</text>

  <!-- Circuit diagram (left half) -->
  <!-- Battery -->
  <line x1="50"  y1="60"  x2="50"  y2="90"  stroke="#333" stroke-width="2"/>
  <line x1="38"  y1="92"  x2="62"  y2="92"  stroke="#333" stroke-width="3"/>
  <line x1="42"  y1="100" x2="58"  y2="100" stroke="#333" stroke-width="1.5"/>
  <line x1="50"  y1="102" x2="50"  y2="140" stroke="#333" stroke-width="2"/>
  <text x="68"   y="98"  font-size="11" fill="#333">ε</text>

  <!-- Top wire: battery + → R → C → back -->
  <line x1="50"  y1="60"  x2="120" y2="60"  stroke="#333" stroke-width="2"/>
  <rect x="120"  y="50"   width="60" height="20" rx="4" fill="white" stroke="#e05252" stroke-width="2"/>
  <text x="150"  y="64"  text-anchor="middle" font-size="11" fill="#e05252">R</text>
  <line x1="180"  y1="60" x2="218" y2="60"  stroke="#333" stroke-width="2"/>
  <!-- Capacitor plates -->
  <line x1="218"  y1="46" x2="218" y2="74"  stroke="#2980b9" stroke-width="3"/>
  <line x1="228"  y1="46" x2="228" y2="74"  stroke="#2980b9" stroke-width="3"/>
  <text x="223"  y="44"  text-anchor="middle" font-size="11" fill="#2980b9">C</text>
  <line x1="228"  y1="60" x2="260" y2="60"  stroke="#333" stroke-width="2"/>
  <line x1="260"  y1="60" x2="260" y2="140" stroke="#333" stroke-width="2"/>
  <line x1="50"   y1="140" x2="260" y2="140" stroke="#333" stroke-width="2"/>

  <!-- Switch -->
  <circle cx="155" cy="140" r="4" fill="none" stroke="#333" stroke-width="2"/>
  <line x1="159"  y1="137" x2="170" y2="128" stroke="#333" stroke-width="1.5"/>
  <text x="162"  y="160" font-size="10" fill="#555">S (close at t=0)</text>

  <!-- Charging curve (right half) -->
  <text x="420" y="50" text-anchor="middle" font-size="12" fill="#333" font-weight="bold">Charge vs Time</text>
  <!-- Axes -->
  <line x1="320" y1="200" x2="540" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="320" y1="200" x2="320" y2="60"  stroke="#333" stroke-width="1.5"/>
  <text x="542" y="204" font-size="11" fill="#555">t</text>
  <text x="312" y="58" text-anchor="end" font-size="11" fill="#555">q</text>
  <!-- Asymptote Cε -->
  <line x1="320" y1="80" x2="540" y2="80" stroke="#aaa" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="544" y="84" font-size="10" fill="#888">Cε</text>
  <!-- Charging curve: q = Cε(1-e^-t/τ) -->
  <path d="M320,200 Q355,112 390,92 Q430,78 540,80" fill="none" stroke="#e05252" stroke-width="2.5"/>
  <!-- τ marker -->
  <line x1="368" y1="80" x2="368" y2="200" stroke="#555" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="368" y="215" text-anchor="middle" font-size="10" fill="#555">τ=RC</text>
  <text x="356" y="142" font-size="9" fill="#e05252">0.63Cε</text>
  <!-- Discharging curve -->
  <path d="M320,80 Q355,96 390,130 Q430,165 540,196" fill="none" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="430" y="155" font-size="10" fill="#2980b9">Discharge</text>
  <text x="380" y="240" text-anchor="middle" font-size="10" fill="#555">q(t)=Cε(1−e^(−t/RC))  |  q(t)=Cε·e^(−t/RC)</text>
</svg>
