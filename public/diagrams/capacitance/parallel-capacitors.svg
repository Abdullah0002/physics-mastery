<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560" height="260" font-family="Arial, sans-serif">
  <rect width="560" height="260" fill="#f8f9fa" rx="10"/>
  <text x="280" y="26" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2d5a">Parallel: Same Voltage V, Charges Add</text>
  <line x1="50" y1="150" x2="50" y2="120" stroke="#333" stroke-width="2"/>
  <line x1="40" y1="120" x2="60" y2="120" stroke="#333" stroke-width="4"/>
  <line x1="44" y1="113" x2="56" y2="113" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="113" x2="50" y2="60" stroke="#333" stroke-width="2"/>
  <text x="30" y="140" font-size="12" fill="#333">V</text>
  <!-- top rail -->
  <line x1="50" y1="60" x2="450" y2="60" stroke="#333" stroke-width="2"/>
  <!-- bottom rail -->
  <line x1="50" y1="150" x2="50" y2="200" stroke="#333" stroke-width="2"/>
  <line x1="50" y1="200" x2="450" y2="200" stroke="#333" stroke-width="2"/>
  <!-- C1 -->
  <line x1="150" y1="60" x2="150" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="135" y1="110" x2="165" y2="110" stroke="#e05252" stroke-width="3"/>
  <line x1="135" y1="120" x2="165" y2="120" stroke="#e05252" stroke-width="3"/>
  <line x1="150" y1="120" x2="150" y2="200" stroke="#333" stroke-width="2"/>
  <text x="178" y="118" font-size="11" fill="#e05252">C&#8321;,Q&#8321;</text>
  <!-- C2 -->
  <line x1="280" y1="60" x2="280" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="265" y1="110" x2="295" y2="110" stroke="#2980b9" stroke-width="3"/>
  <line x1="265" y1="120" x2="295" y2="120" stroke="#2980b9" stroke-width="3"/>
  <line x1="280" y1="120" x2="280" y2="200" stroke="#333" stroke-width="2"/>
  <text x="308" y="118" font-size="11" fill="#2980b9">C&#8322;,Q&#8322;</text>
  <!-- C3 -->
  <line x1="410" y1="60" x2="410" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="395" y1="110" x2="425" y2="110" stroke="#27ae60" stroke-width="3"/>
  <line x1="395" y1="120" x2="425" y2="120" stroke="#27ae60" stroke-width="3"/>
  <line x1="410" y1="120" x2="410" y2="200" stroke="#333" stroke-width="2"/>
  <text x="438" y="118" font-size="11" fill="#27ae60">C&#8323;,Q&#8323;</text>
  <text x="250" y="228" text-anchor="middle" font-size="13" fill="#1a2d5a">C&#8331;&#8320; = C&#8321; + C&#8322; + C&#8323;   (Q = Q&#8321;+Q&#8322;+Q&#8323;)</text>
  <text x="250" y="247" text-anchor="middle" font-size="11" fill="#999">Largest charge sits on the largest capacitor</text>
</svg>
